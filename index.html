<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 消耗排名</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #16213e;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --accent4: #f7971e;
  --text: #e0e0e0;
  --text2: #8888aa;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background particles */
#particles-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* Header */
.header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 20px 20px;
  background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(255,101,132,0.10));
  border-bottom: 1px solid rgba(108,99,255,0.15);
  overflow: visible;
}
/* Upload button top-right in header */
.header .upload-area {
  position: absolute;
  top: 16px;
  right: 24px;
  margin: 0;
  padding: 0;
  z-index: 10;
}
.header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(108,99,255,0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(255,101,132,0.04) 0%, transparent 50%);
  animation: headerGlow 8s ease-in-out infinite alternate;
}
@keyframes headerGlow {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(2%,2%) rotate(3deg); }
}
.header h1 {
  position: relative;
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #6c63ff, #ff6584, #f7971e);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 4s ease infinite;
  letter-spacing: 1px;
}
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.header p {
  position: relative;
  color: var(--text2);
  margin-top: 8px;
  font-size: 0.95rem;
}

/* ==================== UPLOAD AREA (Compact) ==================== */
.drop-zone {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 10px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(255,101,132,0.10));
  border: 1px solid rgba(108,99,255,0.25);
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(108,99,255,0.25), rgba(255,101,132,0.18));
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(108,99,255,0.2);
}
.drop-zone .icon {
  font-size: 0.75rem;
  display: inline-block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
.drop-zone h2 {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text);
}
.drop-zone p {
  display: none;
}
.drop-zone input[type="file"] {
  display: none;
}
.drop-zone .file-info {
  display: none;
  padding: 2px 8px;
  background: rgba(67,233,123,0.12);
  border-radius: 12px;
  font-size: 0.68rem;
  color: var(--accent3);
  white-space: nowrap;
  animation: fadeIn 0.5s ease;
}
.drop-zone.file-loaded {
  border-color: var(--accent3);
  background: rgba(67,233,123,0.08);
}
/* Remote load button */
.remote-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(108,99,255,0.10));
  border: 1px solid rgba(0,212,255,0.25);
  backdrop-filter: blur(8px);
  white-space: nowrap;
  color: var(--text);
  font-size: 0.68rem;
  font-weight: 600;
  margin-left: 8px;
  font-family: inherit;
}
.remote-btn:hover {
  border-color: #00d4ff;
  background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(108,99,255,0.18));
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(0,212,255,0.2);
}
/* Hidden full-area drag overlay for drag-drop */
#dragOverlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 9999;
  background: rgba(108,99,255,0.08);
  backdrop-filter: blur(4px);
  border: 3px dashed var(--accent);
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  color: var(--accent);
  font-weight: 700;
}
#dragOverlay.show { display: flex; }

/* Stats Overview */
.stats-overview {
  position: relative;
  z-index: 1;
  display: none;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}
.stats-overview.show { display: block; }

.stat-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin: 30px 0;
}
.stat-card {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,0.04);
  animation: cardSlideUp 0.6s ease backwards;
  transition: transform 0.3s ease;
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0.6;
}
.stat-card:hover { transform: translateY(-4px); }
.stat-card:nth-child(1) { animation-delay: 0s; }
.stat-card:nth-child(2) { animation-delay: 0.1s; }
.stat-card:nth-child(3) { animation-delay: 0.2s; }
.stat-card:nth-child(4) { animation-delay: 0.3s; }
.stat-card:nth-child(5) { animation-delay: 0.4s; }
.stat-card:nth-child(6) { animation-delay: 0.5s; }

.stat-card .label {
  font-size: 0.8rem;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}
.stat-card .value {
  font-size: 1.8rem;
  font-weight: 800;
  margin-top: 8px;
  background: linear-gradient(135deg, #fff, #a0a0cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-card .sub {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 4px;
}

@keyframes cardSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}


/* ==================== PODIUM (Top 3) — Premium ==================== */
.podium-section {
  margin: 28px 0;
  position: relative;
  animation: fadeSlideUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
  animation-delay: 0.1s;
  min-height: 380px;
}
#fireworks-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  border-radius: 20px;
}
.podium-card {
  background: linear-gradient(145deg, #1c1c3a, #151528);
  border-radius: 24px;
  padding: 36px 20px 28px;
  box-shadow: 0 0 60px rgba(108,99,255,0.08), 0 8px 40px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
  z-index: 2;
}
/* Premium border glow */
.podium-card::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px; right: -1px;
  height: 3px;
  background: linear-gradient(90deg, #cd7f32, #c0c0c0, #ffd700, #ffd700, #c0c0c0, #cd7f32);
  background-size: 200% 100%;
  animation: podiumBorderShine 3s ease-in-out infinite;
  border-radius: 24px 24px 0 0;
}
@keyframes podiumBorderShine {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
/* Subtle radial flare */
.podium-card::after {
  content: '';
  position: absolute;
  top: -30%;
  left: 50%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,215,0,0.04), transparent 70%);
  transform: translateX(-50%);
  pointer-events: none;
}
.podium-card h3 {
  text-align: center;
  font-size: 1.05rem;
  font-weight: 800;
  color: #fff;
  margin-bottom: 28px;
  letter-spacing: 3px;
  text-shadow: 0 0 30px rgba(108,99,255,0.3);
  position: relative;
  z-index: 3;
}
.podium-grid {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 20px;
  max-width: 680px;
  margin: 0 auto;
  position: relative;
  z-index: 3;
}
.podium-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  animation: podiumBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  position: relative;
}
.podium-item:nth-child(1) { animation-delay: 0.3s; } /* 2nd */
.podium-item:nth-child(2) { animation-delay: 0.1s; } /* 1st */
.podium-item:nth-child(3) { animation-delay: 0.5s; } /* 3rd */

@keyframes podiumBounce {
  0% { opacity: 0; transform: translateY(80px) scale(0.6); }
  50% { transform: translateY(-12px) scale(1.04); }
  75% { transform: translateY(4px) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.podium-medal {
  font-size: 2.2rem;
  margin-bottom: 4px;
  animation: medalFloat 2.5s ease-in-out infinite;
  filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));
}
@keyframes medalFloat {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-6px) rotate(2deg); }
}





.podium-avatar {
  min-width: 56px;
  width: auto !important;
  padding: 0 16px !important;
  border-radius: 30px !important;
  font-size: 0.85rem !important;
  white-space: nowrap;
}
.podium-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: #eee;
  margin-bottom: 2px;
  text-shadow: 0 0 10px rgba(255,255,255,0.05);
}
.podium-cost {
  font-size: 0.85rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, #c0c0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.podium-pct {
  font-size: 0.65rem;
  color: var(--text2);
  margin-bottom: 8px;
}
.podium-bar-wrapper {
  width: 100%;
  max-width: 100px;
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}
.podium-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.podium-bar-1 { background: linear-gradient(90deg, #ffd700, #fff4a0); box-shadow: 0 0 8px rgba(255,215,0,0.3); }
.podium-bar-2 { background: linear-gradient(90deg, #c0c0c0, #e8e8e8); box-shadow: 0 0 6px rgba(192,192,192,0.2); }
.podium-bar-3 { background: linear-gradient(90deg, #cd7f32, #e8b87a); box-shadow: 0 0 6px rgba(205,127,50,0.2); }

/* Premium 3D stands */
.podium-stand {
  width: 100%;
  max-width: 130px;
  border-radius: 8px 8px 0 0;
  margin-top: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 800;
  color: rgba(255,255,255,0.6);
  letter-spacing: 2px;
  position: relative;
}
.podium-stand-1 {
  height: 75px;
  background: linear-gradient(180deg, rgba(255,215,0,0.35), rgba(255,215,0,0.08));
  border: 1px solid rgba(255,215,0,0.15);
  border-bottom: none;
  box-shadow: inset 0 8px 20px rgba(255,215,0,0.05);
}
.podium-stand-1::after {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent);
}
.podium-stand-2 {
  height: 55px;
  background: linear-gradient(180deg, rgba(192,192,192,0.25), rgba(192,192,192,0.06));
  border: 1px solid rgba(192,192,192,0.12);
  border-bottom: none;
  box-shadow: inset 0 8px 20px rgba(192,192,192,0.04);
}
.podium-stand-3 {
  height: 40px;
  background: linear-gradient(180deg, rgba(205,127,50,0.25), rgba(205,127,50,0.06));
  border: 1px solid rgba(205,127,50,0.12);
  border-bottom: none;
  box-shadow: inset 0 8px 20px rgba(205,127,50,0.04);
}
/* Confetti pieces */
.confetti-piece {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 2px;
  z-index: 1;
  pointer-events: none;
}

/* ==================== ENHANCED ANIMATIONS ==================== */
@keyframes fadeSlideUp {
  0% { opacity: 0; transform: translateY(40px) scale(0.96); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.stat-card {
  animation: fadeSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
.chart-card {
  animation: fadeSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards;
  animation-delay: 0.3s;
}
/* Shimmer overlay on cards */
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
  animation: shimmer 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0% { transform: translateX(0); }
  60%, 100% { transform: translateX(300%); }
}
/* Glow ring on hover for podium avatar */
.podium-item {
  transition: transform 0.3s ease;
}
.podium-item:hover {
  transform: translateY(-4px);
}
/* Row animation enhanced */
@keyframes rowSlideIn {
  0% { opacity: 0; transform: translateX(-20px) scale(0.98); }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}
.account-table tbody tr {
  animation: rowSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
/* Stat value count-up effect */
.stat-card .value {
  animation: countPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}
@keyframes countPop {
  0% { opacity: 0; transform: scale(0.5); }
  100% { opacity: 1; transform: scale(1); }
}
/* Header glow pulse */
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: headerPulse 2s ease-in-out infinite;
}
@keyframes headerPulse {
  0%, 100% { opacity: 0.3; width: 200px; }
  50% { opacity: 1; width: 300px; }
}

/* Chart Grid */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 20px 0;
}
.chart-full {
  grid-column: 1 / -1;
}
.chart-card {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,0.04);
  animation: cardSlideUp 0.6s ease backwards;
  animation-delay: 0.3s;
}
.chart-card h3 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-card h3 .badge {
  font-size: 0.65rem;
  background: rgba(108,99,255,0.2);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 400;
}
.chart-wrapper {
  position: relative;
  width: 100%;
  height: 350px;
}
.chart-wrapper.tall { height: 450px; }

/* Account Details Table */
.account-details {
  margin: 20px 0;
}
.account-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
.account-table thead th {
  text-align: left;
  padding: 12px 16px;
  background: rgba(108,99,255,0.08);
  color: var(--accent);
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid rgba(108,99,255,0.15);
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
}
.account-table thead th:first-child { border-radius: 10px 0 0 0; }
.account-table thead th:last-child { border-radius: 0 10px 0 0; }
.account-table tbody tr {
  transition: all 0.3s ease;
  animation: rowFadeIn 0.4s ease backwards;
}
.account-table tbody tr:hover {
  background: rgba(108,99,255,0.05);
  transform: scale(1.002);
}
.account-table tbody td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.account-table .rank {
  font-weight: 700;
  color: var(--text2);
  width: 40px;
}
.account-table .rank-1 { color: #ffd700; }
.account-table .rank-2 { color: #c0c0c0; }
.account-table .rank-3 { color: #cd7f32; }
.account-table .name-cell {
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.account-table .avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.account-table .bar-cell {
  position: relative;
  min-width: 120px;
}
.account-table .bar-bg {
  position: absolute;
  left: 16px;
  right: 16px;
  top: 50%;
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  transform: translateY(-50%);
  overflow: hidden;
}
.account-table .bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.account-table .cost-cell {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

@keyframes rowFadeIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar select, .filter-bar input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
  transition: all 0.3s ease;
  cursor: pointer;
}
.filter-bar select:focus, .filter-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(108,99,255,0.1);
}
.filter-bar select option {
  background: var(--bg);
  color: var(--text);
}
.filter-bar label {
  font-size: 0.85rem;
  color: var(--text2);
}

/* Responsive */
@media (max-width: 900px) {
  .chart-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.6rem; }
  .stat-cards { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 500px) {
  .stat-cards { grid-template-columns: 1fr; }
  .chart-wrapper { height: 280px; }
  .chart-wrapper.tall { height: 350px; }
}

/* Loading spinner */
.loading {
  display: none;
  text-align: center;
  padding: 20px;
}
.loading.show { display: block; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(108,99,255,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Fade in */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Tooltip custom */
.chart-tip {
  background: rgba(26,26,46,0.95);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 0.8rem;

</head>
<body>

<script>
// ==================== PARTICLES ====================
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [], animId;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = document.documentElement.scrollHeight;
}
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor(explode) {
    if (explode) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 6 + 2;
      this.x = canvas.width / 2 + (Math.random() - 0.5) * 100;
      this.y = canvas.height / 2 + (Math.random() - 0.5) * 60;
      this.speedX = Math.cos(angle) * speed;
      this.speedY = Math.sin(angle) * speed;
      this.life = 1;
      this.decay = Math.random() * 0.015 + 0.005;
    } else {
      this.reset();
    }
    this.size = Math.random() * 3 + 1;
    this.opacity = Math.random() * 0.6 + 0.2;
    this.hue = Math.random() * 360;
    this.saturation = Math.random() * 30 + 60;
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.speedY = (Math.random() - 0.5) * 0.4;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.hue = Math.random() * 120 + 200;
    this.life = undefined;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.life !== undefined) {
      this.life -= this.decay;
      this.opacity = Math.max(0, this.life * 0.6);
      if (this.life <= 0) {
        this.reset();
        this.life = undefined;
      }
    } else {
      if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, 70%, ${this.opacity})`;
    ctx.fill();
  }
}


function particleBurst() {
  for (let i = 0; i < 80; i++) {
    particles.push(new Particle(true));
  }
}
function initParticles() {
  particles = [];
  for (let i = 0; i < 120; i++) particles.push(new Particle());
}
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  // Draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `hsla(250, 60%, 70%, ${0.08 * (1 - dist / 150)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  animId = requestAnimationFrame(animateParticles);
}

resizeCanvas();
initParticles();
animateParticles();


// ==================== CONFETTI ====================
function createConfetti(container) {
  const colors = ['#ffd700', '#ff6584', '#43e97b', '#00d4ff', '#6c63ff', '#ff6b6b', '#a29bfe', '#f7971e'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      position: absolute; z-index: 1; pointer-events: none;
      width: ${4 + Math.random() * 6}px; height: ${4 + Math.random() * 6}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      top: ${-10 + Math.random() * 20}px;
      left: ${Math.random() * 100}%;
      opacity: ${0.6 + Math.random() * 0.4};
      animation: confettiFall ${2 + Math.random() * 3}s linear ${Math.random() * 2}s infinite;
    `;
    container.appendChild(el);
  }
}

// Add confetti keyframes
const styleSheet = document.createElement('style');
styleSheet.textContent = `
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.8; }
  80% { opacity: 0.6; }
  100% { transform: translateY(350px) rotate(720deg) scale(0.3); opacity: 0; }
}
@keyframes sparklePop {
  0% { transform: scale(0); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}
`;
document.head.appendChild(styleSheet);

// Trigger confetti 1s after podium mounts
setTimeout(() => {
  const podium = document.getElementById('podiumSection');
  if (podium) {
    for (let i = 0; i < 2; i++) {
      setTimeout(() => createConfetti(podium.querySelector('.podium-card')), i * 1200);
    }
  }
}, 1800);

// ==================== FIREWORKS ====================
const fwCanvas = document.getElementById('fireworks-canvas');
let fwCtx, fwParticles = [], fwRockets = [], fwAnimId;
const fwHex = ['#ffd700','#ff6584','#43e97b','#00d4ff','#6c63ff','#ff6b6b','#a29bfe','#f7971e','#ff1493','#00ff7f','#ff4500','#7b68ee'];
const fwColors = fwHex.map(h => 'rgba('+parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+',1)');

function initFireworks() {
  if (!fwCanvas) return;
  fwCtx = fwCanvas.getContext('2d');
  resizeFireworks();
  // Start after podium is visible
  setTimeout(() => {
    launchBurst(0.5, 0.4);
    setTimeout(() => launchBurst(0.3, 0.3), 800);
    setTimeout(() => launchBurst(0.7, 0.5), 1600);
    // Continuous periodic bursts
    fwInterval = setInterval(() => {
      if (document.hidden) return;
      const x = 0.15 + Math.random() * 0.7;
      const y = 0.2 + Math.random() * 0.5;
      launchBurst(x, y);
    }, 2500 + Math.random() * 2000);
    animateFireworks();
  }, 1200);
}

function resizeFireworks() {
  if (!fwCanvas) return;
  const rect = fwCanvas.parentElement.getBoundingClientRect();
  fwCanvas.width = rect.width;
  fwCanvas.height = rect.height;
}

class FWParticle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.color = color;
    this.alpha = 1;
    this.decay = 0.01 + Math.random() * 0.025;
    this.size = Math.random() * 3 + 1;
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y, alpha: this.alpha});
    if (this.trail.length > 5) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.03; // gravity
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.alpha -= this.decay;
    this.size *= 0.995;
  }
  draw(ctx) {
    // Trail
    this.trail.forEach((t, i) => {
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * (i / this.trail.length) * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = this.color.replace(/[\d.]+\)$/, (t.alpha * 0.3) + ')');
      ctx.fill();
    });
    // Main particle
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace(/[\d.]+\)$/, this.alpha + ')');
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = this.color.replace(/[\d.]+\)$/, (this.alpha * 0.15) + ')');
    ctx.fill();
  }
}

function launchBurst(x, y) {
  if (!fwCtx) return;
  const count = 35 + Math.floor(Math.random() * 30);
  const baseColor = fwColors[Math.floor(Math.random() * fwColors.length)];
  // Create color variations
  for (let i = 0; i < count; i++) {
    const c = Math.random() > 0.3 ? baseColor : fwColors[Math.floor(Math.random() * fwColors.length)];
    fwParticles.push(new FWParticle(
      x * fwCanvas.width,
      y * fwCanvas.height,
      c
    ));
  }
  // Sparkle burst - tiny dots that pop
  for (let i = 0; i < 15; i++) {
    const sp = new FWParticle(x * fwCanvas.width, y * fwCanvas.height, 'rgba(255,255,255,1)');
    sp.size = 1;
    sp.decay = 0.03 + Math.random() * 0.04;
    sp.vx *= 1.8;
    sp.vy *= 1.8;
    fwParticles.push(sp);
  }
}

let fwInterval;

function animateFireworks() {
  if (!fwCtx) return;
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  
  fwParticles = fwParticles.filter(p => p.alpha > 0.01);
  fwParticles.forEach(p => { p.update(); p.draw(fwCtx); });
  
  fwAnimId = requestAnimationFrame(animateFireworks);
}

// Listen for resize
window.addEventListener('resize', resizeFireworks);

// Initialize after page loads
if (document.readyState === 'complete') {
  setTimeout(initFireworks, 1500);
} else {
  window.addEventListener('load', () => setTimeout(initFireworks, 1500));
}

// ==================== DATA PROCESSING ====================
let rawData = [];
let accountColors = {};
const colorPalette = [
  '#6c63ff', '#ff6584', '#43e97b', '#f7971e', '#00d4ff',
  '#ff6b6b', '#a29bfe', '#fd79a8', '#00cec9', '#e17055',
  '#0984e3', '#fdcb6e', '#55efc4', '#e84393', '#74b9ff'
];

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^﻿/, ''));
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(',');
    if (vals.length < headers.length) continue;
    const row = {};
    headers.forEach((h, idx) => { row[h] = vals[idx] ? vals[idx].trim() : ''; });
    row.amount = parseFloat(row.amount) || 0;
    row.price = parseFloat(row.price) || 0;
    row.cost = row.amount * row.price;
    data.push(row);
  }
  return data;
}

function processData(data) {
  const accounts = {};
  const models = {};
  const dailyTotals = {};
  const dailyAccount = {};

  data.forEach(row => {
    let name = row.api_key_name || 'unknown';
    // Merge all sean-related accounts (sean, cloude-sean, cc 桌面版-sean) into one "sean"
    if (name === 'mac' || name.includes('sean') || name.includes('Sean')) name = 'sean';
    if (!accounts[name]) {
      accounts[name] = {
        name,
        totalCost: 0,
        totalRequests: 0,
        inputCacheHit: 0,
        inputCacheMiss: 0,
        outputTokens: 0,
        inputCacheHitCost: 0,
        inputCacheMissCost: 0,
        outputCost: 0,
        models: new Set(),
        dailyData: {}
      };
    }
    const acc = accounts[name];

    // Accumulate
    if (row.type === 'request_count') {
      acc.totalRequests += row.amount;
    } else if (row.type === 'input_cache_hit_tokens') {
      acc.inputCacheHit += row.amount;
      acc.inputCacheHitCost += row.cost;
    } else if (row.type === 'input_cache_miss_tokens') {
      acc.inputCacheMiss += row.amount;
      acc.inputCacheMissCost += row.cost;
    } else if (row.type === 'output_tokens') {
      acc.outputTokens += row.amount;
      acc.outputCost += row.cost;
    }
    acc.totalCost += row.cost;
    if (row.model) acc.models.add(row.model);

    // Model totals
    if (row.model) {
      if (!models[row.model]) models[row.model] = { cost: 0, requests: 0 };
      models[row.model].cost += row.cost;
      if (row.type === 'request_count') models[row.model].requests += row.amount;
    }

    // Daily totals
    const date = row.utc_date;
    if (!dailyTotals[date]) dailyTotals[date] = 0;
    dailyTotals[date] += row.cost;

    if (!dailyAccount[date]) dailyAccount[date] = {};
    if (!dailyAccount[date][name]) dailyAccount[date][name] = 0;
    dailyAccount[date][name] += row.cost;

    if (!acc.dailyData[date]) acc.dailyData[date] = 0;
    acc.dailyData[date] += row.cost;
  });

  // Assign colors
  const names = Object.keys(accounts).sort();
  names.forEach((n, i) => {
    accountColors[n] = colorPalette[i % colorPalette.length];
  });

  return {
    accounts: Object.values(accounts).sort((a, b) => b.totalCost - a.totalCost),
    models,
    dailyTotals: Object.entries(dailyTotals).sort((a, b) => a[0].localeCompare(b[0])),
    dailyAccount,
    totalCost: Object.values(accounts).reduce((s, a) => s + a.totalCost, 0),
    totalRequests: Object.values(accounts).reduce((s, a) => s + a.totalRequests, 0)
  };
}

// ==================== CHARTS ====================
let charts = {};

function destroyCharts() {
  Object.values(charts).forEach(c => { if (c) c.destroy(); });
  charts = {};
}

function formatMoney(n) {
  if (n >= 1) return '$' + n.toFixed(2);
  if (n >= 0.01) return '$' + n.toFixed(3);
  if (n >= 0.001) return '$' + n.toFixed(4);
  return '$' + n.toFixed(6);
}

function formatTokens(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

function renderDashboard(stats) {
  const { accounts, models, dailyTotals, dailyAccount, totalCost, totalRequests } = stats;

  // Stat cards
  const cardsHtml = `
    <div class="stat-card">
      <div class="label">总消耗</div>
      <div class="value">${formatMoney(totalCost)}</div>
      <div class="sub">${accounts.length} 个账号</div>
    </div>
    <div class="stat-card">
      <div class="label">总请求数</div>
      <div class="value">${totalRequests.toLocaleString()}</div>
      <div class="sub">API 调用</div>
    </div>
    <div class="stat-card">
      <div class="label">使用模型数</div>
      <div class="value">${Object.keys(models).length}</div>
      <div class="sub">模型种类</div>
    </div>
    <div class="stat-card">
      <div class="label">日均消耗</div>
      <div class="value">${formatMoney(totalCost / Math.max(dailyTotals.length, 1))}</div>
      <div class="sub">${dailyTotals.length} 天数据</div>
    </div>
    <div class="stat-card">
      <div class="label">最高日均账号</div>
      <div class="value" style="font-size:1.2rem">${accounts[0]?.name || '-'}</div>
      <div class="sub">${formatMoney(accounts[0]?.totalCost || 0)}</div>
    </div>
    <div class="stat-card">
      <div class="label">总 Input Tokens</div>
      <div class="value" style="font-size:1.2rem">${formatTokens(accounts.reduce((s, a) => s + a.inputCacheHit + a.inputCacheMiss, 0))}</div>
      <div class="sub">缓存命中 ${accounts.reduce((s, a) => s + a.inputCacheHit, 0) > accounts.reduce((s, a) => s + a.inputCacheHit + a.inputCacheMiss, 0) * 0.3 ? '✅ 高' : '⚠️ 一般'}</div>
    </div>
  `;
  document.getElementById('statCards').innerHTML = cardsHtml;

  // Show overview
  document.getElementById('overview').classList.add('show');

  // Podium (Top 3)
  renderPodium(accounts, totalCost);
  // Charts
  setTimeout(() => renderCostChart(accounts), 100);
  setTimeout(() => renderRequestChart(accounts), 200);
  setTimeout(() => renderTokenChart(accounts), 300);
  setTimeout(() => renderModelChart(models), 400);
  setTimeout(() => renderPieChart(accounts), 500);
  setTimeout(() => renderRankTable(accounts, totalCost), 600);

  // Trend account filter
  const sel = document.getElementById('trendAccountFilter');
  sel.innerHTML = '<option value="ALL">全部账号</option>' + accounts.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
  setTimeout(() => renderTrendChart(dailyTotals, dailyAccount, accounts), 700);
}

// ==================== COST CHART ====================
function renderCostChart(accounts) {
  if (charts.cost) charts.cost.destroy();
  const ctx = document.getElementById('costChart');
  const names = accounts.map(a => a.name);
  const vals = accounts.map(a => a.totalCost);

  charts.cost = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: names,
      datasets: [{
        label: '消耗 (USD)',
        data: vals,
        backgroundColor: names.map(n => accountColors[n] || '#6c63ff'),
        borderColor: names.map(n => accountColors[n] || '#6c63ff'),
        borderWidth: 1,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 1200,
        easing: 'easeOutQuart'
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(26,26,46,0.95)',
          titleColor: '#e0e0e0',
          bodyColor: '#e0e0e0',
          borderColor: 'rgba(108,99,255,0.2)',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 10,
          callbacks: {
            label: ctx => formatMoney(ctx.raw)
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            color: '#8888aa',
            callback: v => '$' + v.toFixed(3)
          },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        x: {
          ticks: {
            color: '#8888aa',
            maxRotation: 45
          },
          grid: { display: false }
        }
      }
    }
  });
}

// ==================== REQUEST CHART ====================
function renderRequestChart(accounts) {
  if (charts.req) charts.req.destroy();
  const ctx = document.getElementById('requestChart');
  const names = accounts.map(a => a.name);
  const vals = accounts.map(a => a.totalRequests);

  charts.req = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: names,
      datasets: [{
        label: '请求数',
        data: vals,
        backgroundColor: names.map((n, i) => `hsla(${200 + i * 15}, 70%, 60%, 0.7)`),
        borderColor: names.map((n, i) => `hsla(${200 + i * 15}, 70%, 60%, 1)`),
        borderWidth: 1,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 1200, easing: 'easeOutQuart' },

// ==================== PODIUM (Top 3) ====================
function renderPodium(accounts, totalCost) {
  const grid = document.getElementById('podiumGrid');
  const top3 = accounts.slice(0, 3);
  
  // Display order: 2nd, 1st, 3rd
  const order = [1, 0, 2];
  const medals = ['🥈', '🥇', '🥉'];
  const standClasses = ['podium-stand-2', 'podium-stand-1', 'podium-stand-3'];
  const barClasses = ['podium-bar-2', 'podium-bar-1', 'podium-bar-3'];
  
  grid.innerHTML = order.map((idx, displayIdx) => {
    if (!top3[idx]) return '';
    const a = top3[idx];
    const pct = totalCost > 0 ? ((a.totalCost / totalCost) * 100).toFixed(1) : '0.0';
    const letter = a.name;
    const barW = totalCost > 0 ? (a.totalCost / accounts[0].totalCost * 100) : 0;
    
    return `<div class="podium-item">
      <div class="podium-medal">${medals[displayIdx]}</div>
      <div class="podium-name" style="font-size:1.2rem;font-weight:800;text-shadow:0 0 20px rgba(255,255,255,0.12);color:${displayIdx===1?'#ffd700':displayIdx===0?'#c0c0c0':'#cd7f32'}">${letter}</div>
      <div class="podium-cost">${formatMoney(a.totalCost)}</div>
      <div class="podium-pct">${pct}% 占比</div>
      <div class="podium-bar-wrapper">
        <div class="podium-bar-fill ${barClasses[displayIdx]}" style="width: 0%;"></div>
      </div>
      <div class="podium-stand ${standClasses[displayIdx]}">#${idx + 1}</div>
    </div>`;
  }).join('');
  
  // Animate bars after mount
  setTimeout(() => {
    grid.querySelectorAll('.podium-bar-fill').forEach((bar, i) => {
      const idx = order[i];
      if (!top3[idx]) return;
      const w = totalCost > 0 ? (top3[idx].totalCost / accounts[0].totalCost * 100) : 0;
      bar.style.width = w + '%';
    });
  }, 600);
}

// ==================== FILE HANDLING ====================
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const loading = document.getElementById('loading');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', e => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

async function handleFile(file) {
  if (!file.name.endsWith('.csv') && !file.type.includes('csv')) {
    alert('请选择 CSV 文件');
    return;
  }

  loading.classList.add('show');

  // Simulate processing delay for animation
  await new Promise(r => setTimeout(r, 600));

  const text = await file.text();
  rawData = parseCSV(text);

  if (rawData.length === 0) {
    loading.classList.remove('show');
    alert('未能解析到有效数据，请检查 CSV 格式');
    return;
  }

  const stats = processData(rawData);
  window._currentStats = stats;

  // Show file info
  const fi = document.getElementById('fileInfo');
  fi.textContent = `✅ ${file.name} — ${rawData.length} 条记录，${Object.keys(stats.accounts).length} 个账号，${stats.dailyTotals.length} 天数据`;
  fi.style.display = 'block';
  dropZone.classList.add('file-loaded');

  // Update drop zone text
  dropZone.querySelector('h2').textContent = '';
  dropZone.querySelector('p').textContent = '支持任意格式的 DeepSeek API 用量 CSV';

  loading.classList.remove('show');

  // Destroy old charts first
  destroyCharts();

  renderDashboard(stats);
      // Trigger particle burst
      setTimeout(particleBurst, 400);

  // Scroll to overview
  setTimeout(() => {
    document.getElementById('overview').scrollIntoView({ behavior: 'smooth' });
  }, 300);
}


// ==================== REMOTE DATA LOADING ====================
// 数据文件名，放在与 HTML 同一目录下
const CSV_FILE = 'token-data.csv';

// ==================== AUTO-LOAD ON PAGE OPEN ====================
(async function autoLoad() {
  loading.classList.add('show');

  try {
    const response = await fetch(CSV_FILE);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    rawData = parseCSV(text);

    if (rawData.length === 0) throw new Error('Empty data');

    const stats = processData(rawData);
    window._currentStats = stats;

    const fi = document.getElementById('fileInfo');
    fi.textContent = '✅ 已加载最新';
    fi.style.display = 'inline';
    dropZone.classList.add('file-loaded');
    dropZone.querySelector('h2').textContent = '';

    loading.classList.remove('show');
    await new Promise(r => setTimeout(r, 300));
    destroyCharts();
    renderDashboard(stats);
    setTimeout(particleBurst, 400);
    setTimeout(function() {
      document.getElementById('overview').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);
  } catch(e) {
    loading.classList.remove('show');
    console.warn('Auto-load failed:', e.message);
    // Gracefully degrade — user can still upload manually
  }
})();

// ==================== REFRESH BUTTON ====================
document.getElementById('remoteBtn').addEventListener('click', async function() {
  loading.classList.add('show');
  this.disabled = true;

  try {
    // 加时间戳防止浏览器缓存
    const timestamp = new Date().getTime();
    const response = await fetch(CSV_FILE + '?t=' + timestamp);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    rawData = parseCSV(text);

    if (rawData.length === 0) throw new Error('Empty data');

    const stats = processData(rawData);
    window._currentStats = stats;

    const fi = document.getElementById('fileInfo');
    fi.textContent = '✅ 数据已更新';
    fi.style.display = 'inline';
    dropZone.classList.add('file-loaded');
    dropZone.querySelector('h2').textContent = '';

    loading.classList.remove('show');
    destroyCharts();
    renderDashboard(stats);
    setTimeout(particleBurst, 400);
    setTimeout(function() {
      document.getElementById('overview').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);
  } catch(e) {
    loading.classList.remove('show');
    alert('刷新数据失败: ' + e.message + '\n\n请确认 ' + CSV_FILE + ' 文件存在且格式正确，或改用手动上传。');
  } finally {
    this.disabled = false;
  }
});
